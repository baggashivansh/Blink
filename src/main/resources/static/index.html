<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Blink URL Shortener</title>

    <style>

        *{
            box-sizing:border-box;
            margin:0;
            padding:0;
        }

        body{
            font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
            min-height:100vh;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            padding:20px;

            background:linear-gradient(-45deg,#eef2ff,#f8fafc,#e0e7ff,#f1f5ff);
            background-size:400% 400%;
            animation:bgFlow 12s ease infinite;
        }

        @keyframes bgFlow{
            0%{background-position:0% 50%;}
            50%{background-position:100% 50%;}
            100%{background-position:0% 50%;}
        }

        .logo{
            font-size:48px;
            font-weight:800;
            letter-spacing:1px;
            margin-bottom:28px;

            background:linear-gradient(90deg,#6366f1,#3b82f6);
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
        }

        .container{

            background:rgba(255,255,255,.85);
            backdrop-filter:blur(8px);

            padding:40px;
            border-radius:18px;

            width:100%;
            max-width:460px;

            box-shadow:0 20px 40px rgba(0,0,0,.08);

            text-align:center;
        }

        .container h1{
            font-size:24px;
            margin-bottom:26px;
            color:#333;
        }

        input{

            width:100%;
            padding:14px;

            border-radius:10px;
            border:1px solid #e5e7eb;

            font-size:15px;
            margin-bottom:14px;
        }

        button{

            width:100%;
            padding:14px;

            border:none;
            border-radius:10px;

            background:linear-gradient(90deg,#6366f1,#3b82f6);

            color:white;
            font-weight:600;
            font-size:15px;

            cursor:pointer;
        }

        .spinner{

            width:32px;
            height:32px;

            border:3px solid #eee;
            border-top:3px solid #6366f1;

            border-radius:50%;

            margin:22px auto;

            animation:spin .7s linear infinite;

            display:none;
        }

        @keyframes spin{
            to{transform:rotate(360deg);}
        }

        .result-box{
            margin-top:20px;
            display:none;
        }

        .link-box{

            display:flex;

            border:1px solid #e5e7eb;

            border-radius:10px;

            overflow:hidden;
        }

        .link-box input{

            border:none;

            flex:1;

            padding:12px;

            font-size:14px;
        }

        .copy-btn{

            background:#10b981;

            border:none;

            padding:12px 16px;

            color:white;

            cursor:pointer;
        }

        footer{
            margin-top:36px;
            font-size:13px;
            color:#6b7280;
            text-align:center;
        }

    </style>

</head>

<body>

<div class="logo">Blink</div>

<div class="container">

    <h1>Shorten your URL</h1>

    <input id="urlInput" type="url" placeholder="Paste your long URL here">

    <button id="shortenBtn" onclick="shortenUrl()">Shorten URL</button>

    <div class="spinner" id="spinner"></div>

    <div class="result-box" id="resultBox">

        <div class="link-box">
            <input id="shortLinkInput" readonly>
            <button class="copy-btn" onclick="copyLink()">Copy</button>
        </div>

    </div>

</div>

<footer>
    © 2026 Blink • Built by Shivansh Bagga
</footer>

<script>

    async function shortenUrl(){

        const input=document.getElementById("urlInput");
        const url=input.value.trim();

        if(!url){
            alert("Please enter a URL");
            return;
        }

        const spinner=document.getElementById("spinner");
        const result=document.getElementById("resultBox");
        const button=document.getElementById("shortenBtn");

        spinner.style.display="block";
        button.disabled=true;

        try{

            const response=await fetch("/api/shorten",{
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({url})
            });

            if(!response.ok){
                throw new Error("Server error");
            }

            const data=await response.json();

            document.getElementById("shortLinkInput").value=data.shortUrl;

            result.style.display="block";

        }catch(err){

            alert("Failed to shorten URL");

        }

        spinner.style.display="none";
        button.disabled=false;

    }

    function copyLink(){

        const input=document.getElementById("shortLinkInput");

        navigator.clipboard.writeText(input.value);

        alert("Copied!");

    }

</script>

</body>
</html>
