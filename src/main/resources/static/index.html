<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Blink URL Shortener</title>

    <style>

        *{
            box-sizing:border-box;
            margin:0;
            padding:0;
        }

        body{
            font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
            min-height:100vh;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            padding:20px;

            /* soft animated background */

            background:linear-gradient(-45deg,#eef2ff,#f8fafc,#e0e7ff,#f1f5ff);
            background-size:400% 400%;
            animation:bgFlow 12s ease infinite;
        }

        @keyframes bgFlow{
            0%{background-position:0% 50%;}
            50%{background-position:100% 50%;}
            100%{background-position:0% 50%;}
        }

        /* page fade in */

        body{
            animation:fadeIn .6s ease;
        }

        @keyframes fadeIn{
            from{opacity:0; transform:translateY(10px);}
            to{opacity:1; transform:translateY(0);}
        }

        /* logo */

        .logo{
            font-size:48px;
            font-weight:800;
            letter-spacing:1px;
            margin-bottom:28px;

            background:linear-gradient(90deg,#6366f1,#3b82f6);
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
        }

        /* card */

        .container{

            background:rgba(255,255,255,.85);
            backdrop-filter:blur(8px);

            padding:40px;
            border-radius:18px;

            width:100%;
            max-width:460px;

            box-shadow:0 20px 40px rgba(0,0,0,.08);

            text-align:center;

            transition:transform .2s ease;
        }

        .container:hover{
            transform:translateY(-3px);
        }

        /* heading */

        .container h1{
            font-size:24px;
            margin-bottom:26px;
            color:#333;
        }

        /* input */

        input{

            width:100%;
            padding:14px;

            border-radius:10px;
            border:1px solid #e5e7eb;

            font-size:15px;
            margin-bottom:14px;

            transition:border .2s, box-shadow .2s;
        }

        input:focus{
            outline:none;
            border:1px solid #6366f1;
            box-shadow:0 0 0 2px rgba(99,102,241,.15);
        }

        /* button */

        button{

            width:100%;
            padding:14px;

            border:none;
            border-radius:10px;

            background:linear-gradient(90deg,#6366f1,#3b82f6);

            color:white;
            font-weight:600;
            font-size:15px;

            cursor:pointer;

            transition:transform .15s ease, box-shadow .15s ease;
        }

        button:hover{

            transform:translateY(-1px);

            box-shadow:0 8px 18px rgba(0,0,0,.12);
        }

        button:disabled{
            opacity:.6;
            cursor:not-allowed;
        }

        /* spinner */

        .spinner{

            width:32px;
            height:32px;

            border:3px solid #eee;
            border-top:3px solid #6366f1;

            border-radius:50%;

            margin:22px auto;

            animation:spin .7s linear infinite;

            display:none;
        }

        @keyframes spin{
            to{transform:rotate(360deg);}
        }

        /* result */

        .result-box{
            margin-top:20px;
            display:none;
        }

        .link-box{

            display:flex;

            border:1px solid #e5e7eb;

            border-radius:10px;

            overflow:hidden;
        }

        .link-box input{

            border:none;

            flex:1;

            padding:12px;

            font-size:14px;
        }

        .copy-btn{

            background:#10b981;

            border:none;

            padding:12px 16px;

            color:white;

            cursor:pointer;

            transition:background .2s;
        }

        .copy-btn:hover{
            background:#059669;
        }

        .copied{

            color:#10b981;

            font-size:13px;

            margin-top:8px;

            display:none;
        }

        /* footer */

        footer{
            margin-top:36px;
            font-size:13px;
            color:#6b7280;
            text-align:center;
        }

        /* mobile */

        @media(max-width:480px){

            .logo{
                font-size:38px;
            }

            .container{
                padding:28px 20px;
            }

        }

    </style>

</head>

<body>

<div class="logo">Blink</div>

<div class="container">

    <h1>Shorten your URL</h1>

    <input id="urlInput" type="url" placeholder="Paste your long URL here">

    <button id="shortenBtn" onclick="shortenUrl()">Shorten URL</button>

    <div class="spinner" id="spinner"></div>

    <div class="result-box" id="resultBox">

        <div class="link-box">
            <input id="shortLinkInput" readonly>
            <button class="copy-btn" onclick="copyLink()">📋</button>
        </div>

        <div class="copied" id="copiedMsg">Copied to clipboard ✔</div>

    </div>

</div>

<footer>
    © 2026 Blink • Built by <strong>Shivansh Bagga</strong>
</footer>

<script>

    document.getElementById("urlInput").addEventListener("keypress",function(e){
        if(e.key==="Enter"){
            shortenUrl();
        }
    });

    async function shortenUrl(){

        const urlInput=document.getElementById("urlInput");
        const longUrl=urlInput.value.trim();

        const spinner=document.getElementById("spinner");
        const resultBox=document.getElementById("resultBox");
        const button=document.getElementById("shortenBtn");

        if(!longUrl){
            alert("Please enter a URL");
            return;
        }

        button.disabled=true;
        button.innerText="Shortening...";
        spinner.style.display="block";
        resultBox.style.display="none";

        try{

            const response=await fetch("/api/shorten",{

                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                body:JSON.stringify({
                    url:longUrl
                })

            });

            const data=await response.json();

            if(!response.ok){
                throw new Error("Server error");
            }

            document.getElementById("shortLinkInput").value=data.shortUrl;

            resultBox.style.display="block";

            copyLink();

            urlInput.value="";

        }catch(error){

            alert("Error shortening URL");

        }

        spinner.style.display="none";

        button.disabled=false;

        button.innerText="Shorten URL";

    }

    function copyLink(){

        const linkInput=document.getElementById("shortLinkInput");
        const msg=document.getElementById("copiedMsg");

        navigator.clipboard.writeText(linkInput.value);

        msg.style.display="block";

        setTimeout(()=>{
            msg.style.display="none";
        },2000);

    }

</script>

</body>
</html>
